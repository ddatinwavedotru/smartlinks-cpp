version: '3.8'

services:
  # MongoDB сервер
  mongodb:
    image: mongo:latest
    container_name: smartlinks-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: Links
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlinks-network
      
  mongo-express:
    image: mongo-express
    container_name: mexpress
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_URL=mongodb://root:password@mongodb:27017/?authSource=admin
      - ME_CONFIG_BASICAUTH_USERNAME=mexpress
      - ME_CONFIG_BASICAUTH_PASSWORD=mexpress
    depends_on:
      - mongodb
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - smartlinks-network

  # JWT Authentication Service
  jwt-service:
    build:
      context: ./jwt-service
      dockerfile: Dockerfile
    container_name: smartlinks-jwt
    restart: unless-stopped
    # Порт 3000 пробрасывается для интеграционных тестов SmartLinks
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://root:password@mongodb:27017
      - MONGO_DB=Links
      - ACCESS_TOKEN_TTL=10m
      - REFRESH_TOKEN_TTL=14d
      - JWT_ISSUER=smartlinks-jwt-service
      - JWT_AUDIENCE=smartlinks-api
      - NODE_ENV=production
    volumes:
      # Docker volume для персистентности ключей
      - jwt_keys:/app/keys
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartlinks-network

  # SmartLinks C++ микросервис
  smartlinks:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: smartlinks-app
    restart: unless-stopped
    # Порт 8080 доступен только внутри Docker сети (через gateway)
    expose:
      - "8080"
    environment:
      # Переменные окружения можно переопределить здесь
      - LOG_LEVEL=INFO
    volumes:
      # Монтируем Docker-конфигурацию
      - ./config/config.docker.json:/app/config/config.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - smartlinks-network

  # API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    container_name: smartlinks-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - jwt-service
      - smartlinks
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost/gateway/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartlinks-network

volumes:
  mongodb_data:
    driver: local
  jwt_keys:
    driver: local

networks:
  smartlinks-network:
    driver: bridge
