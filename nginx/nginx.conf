user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream для JWT микросервиса
    upstream jwt_service {
        server jwt-service:3000;
        keepalive 32;
    }

    # Upstream для SmartLinks микросервиса
    upstream smartlinks_service {
        server smartlinks:8080;
        keepalive 32;
    }

    # API Gateway
    server {
        listen 80;
        server_name localhost;

        # Максимальный размер тела запроса
        client_max_body_size 10M;

        # Health check для самого gateway
        location /gateway/health {
            access_log off;
            return 200 "Gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # Маршрутизация запросов к JWT сервису
        # /jwt/* -> http://jwt-service:3000/*
        location /jwt/ {
            # Убрать /jwt prefix перед проксированием
            rewrite ^/jwt/(.*) /$1 break;

            proxy_pass http://jwt_service;
            proxy_http_version 1.1;

            # Headers для проксирования
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keepalive
            proxy_set_header Connection "";

            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Логирование
            access_log /var/log/nginx/jwt_access.log main;
            error_log /var/log/nginx/jwt_error.log warn;
        }

        # Специальный маршрут для JWKS (без удаления префикса)
        location /.well-known/jwks.json {
            proxy_pass http://jwt_service/.well-known/jwks.json;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            access_log /var/log/nginx/jwt_access.log main;
        }

        # Маршрутизация всех остальных запросов к SmartLinks
        # /* -> http://smartlinks:8080/*
        location / {
            proxy_pass http://smartlinks_service;
            proxy_http_version 1.1;

            # Headers для проксирования
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keepalive
            proxy_set_header Connection "";

            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Логирование
            access_log /var/log/nginx/smartlinks_access.log main;
            error_log /var/log/nginx/smartlinks_error.log warn;
        }

        # Страница ошибки 502 (Bad Gateway)
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
